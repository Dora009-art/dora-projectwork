<!DOCTYPE html>
<html>
<head>
    <title>Contact Me</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #00f5d4;
            font-size: 35px;
        }
        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border: 2px solid #00f5d4;
            background-color: #222;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #00f5d4;
            color: black;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        a {
            color: #00f5d4;
            text-decoration: none;
            display: block;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>Contact Me</h1>
    <form action="https://formspree.io/f/xrenqoga" method="POST">
    <input type="text" name="name" placeholder="Your Name" required><br>
    <input type="email" name="email" placeholder="Your Email" required><br>
    <textarea name="message" placeholder="Your Message" rows="4" required></textarea><br>
    <button type="submit">Send Message</button>
</form>

    
<a href="index.html">← Go Back Home</a>
</body>
</html>
